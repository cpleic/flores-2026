<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 FLOWER COUNTER 3000 - EDIÇÃO ELITE 🌸</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --retro-red: #ff0000;
        }

        body {
            background-color: #000;
            color: white;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            margin: 0;
            overflow-x: hidden;
        }

        .troll-container { padding: 0; }

        .marquee-top {
            background: var(--neon-pink);
            color: white;
            font-weight: bold;
            padding: 10px;
            font-size: 1.5rem;
            border-bottom: 5px solid white;
            white-space: nowrap;
            overflow: hidden;
            box-sizing: border-box;
        }

        .marquee-inner {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .glitch-title {
            text-align: center;
            font-size: clamp(2rem, 8vw, 4rem);
            color: var(--neon-green);
            text-shadow: 4px 4px var(--retro-red), -4px -4px var(--neon-blue);
            margin: 30px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .subtitle { 
            text-align: center; 
            color: var(--neon-blue); 
            font-style: italic; 
            margin-bottom: 40px;
            font-size: 1.2rem;
        }

        .main-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .banner-lateral {
            width: 220px;
            position: sticky;
            top: 20px;
            text-align: center;
            background: #111;
            border: 3px solid var(--neon-pink);
            padding: 10px;
            box-shadow: 0 0 20px var(--neon-pink);
            z-index: 10;
        }

        .left-troll { margin-right: 20px; }
        .right-troll { margin-left: 20px; }

        .banner-lateral img { width: 100%; border-radius: 5px; filter: contrast(120%); }
        .banner-lateral p { font-weight: bold; color: yellow; margin-top: 10px; font-size: 0.9rem; }

        .content-center {
            flex: 1;
            max-width: 800px;
            padding: 0 20px;
        }

        .blink { 
            animation: blinker 0.6s linear infinite; 
            color: yellow; 
            text-align: center; 
            font-size: 2rem;
            margin-bottom: 20px;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        .retro-table-container {
            background: #222;
            border: 4px solid var(--neon-blue);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 10px 10px 0px var(--neon-blue);
        }

        .troll-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.3rem;
        }

        .troll-table th {
            background: var(--neon-blue);
            color: black;
            padding: 15px;
            text-transform: uppercase;
        }

        .troll-table td {
            padding: 15px;
            border-bottom: 1px solid #444;
            text-align: center;
        }

        .rank-cell { font-weight: bold; color: var(--neon-pink); font-size: 1.5rem; }
        .score-cell { color: var(--neon-green); font-weight: bold; font-size: 1.8rem; }

        .chaos-box {
            margin: 50px 0;
            background: linear-gradient(90deg, #ff0000, #ff00ff, #0000ff, #00ff00);
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
            padding: 8px;
            border-radius: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .info-grid {
            background: #000;
            padding: 25px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-card {
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
        }

        .info-card strong { font-size: 1.8rem; display: block; margin: 10px 0; }
        .cyan { color: var(--neon-blue); }
        .pink { color: var(--neon-pink); }
        .green { color: var(--neon-green); }
        .red { color: var(--retro-red); }

        @media (max-width: 900px) {
            .banner-lateral { display: none; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="troll-container">
        <div class="marquee-top">
            <div class="marquee-inner" id="infinite-marquee"></div>
        </div>

        <style>
            .marquee-top {
                background: var(--neon-pink);
                color: white;
                font-weight: bold;
                padding: 15px;
                font-size: 1.5rem;
                border-bottom: 5px solid white;
                overflow: hidden; /* Esconde o que sai da barra */
                position: relative;
            }

            .marquee-inner {
                display: inline-block;
                white-space: nowrap;
                padding-left: 100%;
                /* Aumentei para 500s para ir bem devagar, estilo "tortura" */
                animation: marquee-troll 500s linear infinite;
            }

            /* Direção corrigida: da direita para a esquerda */
            @keyframes marquee-troll {
                0%   { transform: translateX(0); }
                100% { transform: translateX(-100%); }
            }
        </style>

        <script>
            const marqueeContainer = document.getElementById('infinite-marquee');
            
            let repetitions = 800; 
            let loopContent = "🌸 FLOWER COUNTER DE LEIC 🌸 — Duvido que chegues ao fim disto — ";
            
            for (let i = 0; i < repetitions; i++) {
                loopContent += "JÁ CHEGÁMOS? — ";
            }
            
            loopContent += "🌸 Sim, vieste ao inspecionar para nada. Se esperaste este tempo todo, toma um cookie 🍪";
            
            marqueeContainer.innerText = loopContent;
        </script>

        <h1 class="glitch-title">🌸 Flower Counter de LEIC 🌸</h1>
        <p class="subtitle">Bora lá fazer a melhor carrinha do cortejo!</p>

        <div class="main-layout">
            <div class="banner-lateral left-troll">
                <img src="assets/burro.jpg" alt="Burro" />
                <p>Olá :)</p>
            </div>

            <div class="content-center">
                <h2 class="blink">🏆 TOP 10 PÉTELEIROS 🏆</h2>
                <div id="leaderboard" class="retro-table-container">
                    <p style="text-align:center; padding: 20px;">A carregar...</p>
                </div>
                
                <div id="contador"></div>
            </div>

            <div class="banner-lateral right-troll">
                <img src="assets/shrek.jfif" alt="Shrek" />
                <p>AND THEY DONT STOP COMMING</p>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRuKipVQ3eTDJtF7FZc3jbsIGFW5BT1x9poLiczk1ExOita41P4Q5jCBanF2K1FTUVFglvKV_TlIVyG/pub?gid=1471616984&single=true&output=csv';

        async function init() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderLeaderboard(results.data);
                    renderContadores(results.data);
                }
            });
        }

        function renderLeaderboard(data) {
            const container = document.getElementById('leaderboard');
            
            const validRows = data.filter(row => row.Nome && row.Nome.trim() !== "");
            const sortedByScore = validRows
                .slice()
                .sort((a, b) => parseFloat(b.Soma || 0) - parseFloat(a.Soma || 0));

            const branquinhoIndex = sortedByScore.findIndex(
                row => row.Nome.trim().toLowerCase() === "branquinho"
            );

            if (branquinhoIndex > 0) {
                const [branquinhoRow] = sortedByScore.splice(branquinhoIndex, 1);
                sortedByScore.unshift(branquinhoRow);
            }

            const sortedData = sortedByScore.slice(0, 10);

            let html = '<table class="troll-table"><tr><th>#</th><th>Pételeiro</th><th>Pétalas</th></tr>';
            
            sortedData.forEach((row, i) => {
                let rank = i + 1;
                if (i === 0) rank = '👑';
                if (i === 1) rank = '🥈';
                if (i === 2) rank = '🥉';
                const displayScore = row.Nome && row.Nome.trim().toLowerCase() === "branquinho"
                    ? "1000000"
                    : row.Soma;

                html += `
                    <tr>
                        <td class="rank-cell">${rank}</td>
                        <td class="name-cell">${row.Nome}</td>
                        <td class="score-cell">${displayScore}</td>
                    </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        function renderContadores(data) {
            const hoje = new Date();
            const dezanoveMaio = new Date(hoje.getFullYear(), 4, 19);
            if (hoje > dezanoveMaio) dezanoveMaio.setFullYear(dezanoveMaio.getFullYear() + 1);
            const diasRestantes = Math.ceil((dezanoveMaio - hoje) / (1000 * 60 * 60 * 24));
            
            const stats = data[0]; 
            
            const faltamFlores = stats["Faltam (Flores)"] || "0";
            const faltamPetalas = stats["Faltam (Pétalas)"] || "0";

            document.getElementById('contador').innerHTML = `
                <div class="chaos-box">
                    <div class="info-grid">
                        <div class="info-card cyan">⏳ DIAS PARA O CORTEJO <strong id="dias">${diasRestantes}</strong></div>
                        <div class="info-card pink">🌸 PÉTALAS EM FALTA <strong>${faltamPetalas}</strong></div>
                        <div class="info-card green">🌼 FLORES PARA A META <strong>${faltamFlores}</strong></div>
                        <div class="info-card red">🫏 TERMOS CALOIROS DE JEITO <strong style="font-size:1.2rem">NUNCA (ERR: 404)</strong></div>
                    </div>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
